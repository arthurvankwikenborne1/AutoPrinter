<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Print Agent</title>
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js" type="text/javascript"></script>
    <script src="https://alcdn.msauth.net/browser/3.10.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="taskpane.css" />
</head>

<body>

    <header class="app-header">
        <div class="app-header__logo">
            <span class="app-header__icon">🖨️</span>
            <div>
                <h1 class="app-header__title" id="appTitle">PDF Print Agent</h1>
                <p class="app-header__subtitle" id="appSubtitle">Druk bijlagen af vanuit ongelezen mails</p>
            </div>
        </div>
        <div class="app-header__user" id="userInfo" style="display:none">
            <span id="userName" class="user-name"></span>
            <button id="signOutBtn" class="btn-link" title="Afmelden">↩</button>
        </div>
    </header>

    <div class="lang-switcher">
        <button id="langNL" class="lang-btn lang-btn--active">NL</button>
        <button id="langEN" class="lang-btn">EN</button>
        <button id="historyTab" class="lang-btn" style="margin-left:auto">📋</button>
    </div>

    <div id="printResult" class="print-result" style="display:none"></div>

    <main class="app-main">

        <!-- idle -->
        <div id="stateIdle" class="state">
            <div class="idle-content">
                <div class="idle-icon">📬</div>
                <p class="idle-desc" id="idleDesc">Klik op de knop om uw ongelezen mails te scannen op PDF en Word bijlagen.</p>
                <button id="scanBtn" class="btn btn--primary btn--large">
                    <span class="btn__icon">🔍</span>
                    <span id="scanBtnLabel">Scan ongelezen mails</span>
                </button>
            </div>
        </div>

        <!-- loading -->
        <div id="stateLoading" class="state state--hidden">
            <div class="loading-content">
                <div class="spinner"></div>
                <p id="loadingStatus" class="loading-status">Ongelezen mails ophalen...</p>
                <button id="cancelBtn" class="btn btn--ghost btn--small">Annuleren</button>
            </div>
        </div>

        <!-- printing -->
        <div id="statePrinting" class="state state--hidden">
            <div class="loading-content">
                <div class="spinner"></div>
                <p id="printStatus" class="loading-status">Afdrukken...</p>
            </div>
        </div>

        <!-- loaded -->
        <div id="stateLoaded" class="state state--hidden">
            <div class="toolbar">
                <label class="checkbox-label">
                    <input type="checkbox" id="selectAllCheckbox" />
                    <span id="selectAllLabel">Alles selecteren</span>
                </label>
                <span id="selectionCount" class="selection-count"></span>
                <button id="clearBtn" class="btn btn--ghost btn--small">Wissen</button>
            </div>
            <div id="attachmentList" class="attachment-list"></div>
            <div class="print-bar">
                <button id="printBtn" class="btn btn--primary btn--full" disabled>
                    <span class="btn__icon">🖨️</span>
                    <span id="printBtnLabel">Afdrukken</span>
                </button>
                <button id="rescanBtn" class="btn btn--ghost btn--small">
                    <span id="rescanBtnLabel">Opnieuw scannen</span>
                </button>
            </div>
        </div>

        <!-- empty -->
        <div id="stateEmpty" class="state state--hidden">
            <div class="empty-content">
                <div class="empty-icon">📭</div>
                <p id="emptyMessage" class="empty-message">Geen PDF- of Word-bijlagen gevonden in ongelezen mails.</p>
                <button id="rescanBtnEmpty" class="btn btn--primary">
                    <span id="rescanEmptyLabel">Opnieuw scannen</span>
                </button>
            </div>
        </div>

        <!-- error -->
        <div id="stateError" class="state state--hidden">
            <div class="error-content">
                <div class="error-icon">⚠️</div>
                <p id="errorMessage" class="error-message"></p>
                <button id="retryBtn" class="btn btn--primary">Opnieuw proberen</button>
            </div>
        </div>

        <!-- history -->
        <div id="stateHistory" class="state state--hidden">
            <div class="toolbar">
                <button id="backFromHistory" class="btn btn--ghost btn--small">← Terug</button>
                <span class="th" style="margin-left:8px">Afdrukhistoriek</span>
            </div>
            <div id="historyList" class="attachment-list"></div>
        </div>

    </main>

    <iframe id="printFrame" style="display:none"></iframe>

    <script type="module" src="taskpane.js"></script>
</body>

</html>
